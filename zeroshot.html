<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 500px;
        }
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.3);
        }
        .error {
            color: #e74c3c;
            font-size: 12px;
            margin-top: 5px;
            display: none;
        }
        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .success {
            color: #27ae60;
            text-align: center;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Registration</h1>
        <form id="registrationForm" onsubmit="handleSubmit(event)">
            
            <div class="form-group">
                <label for="name">Full Name *</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name">
                <div class="error" id="nameError"></div>
            </div>

            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" name="email" placeholder="Enter your email">
                <div class="error" id="emailError"></div>
            </div>

            <div class="form-group">
                <label for="class">Class *</label>
                <select id="class" name="class">
                    <option value="">-- Select Class --</option>
                    <option value="9">Class 9</option>
                    <option value="10">Class 10</option>
                    <option value="11">Class 11</option>
                    <option value="12">Class 12</option>
                </select>
                <div class="error" id="classError"></div>
            </div>

            <div class="form-group">
                <label for="phone">Phone Number *</label>
                <input type="phone" id="phone" name="phone" placeholder="Enter 10-digit phone number">
                <div class="error" id="phoneError"></div>
            </div>

            <div class="form-group">
                <label for="dob">Date of Birth *</label>
                <input type="date" id="dob" name="dob">
                <div class="error" id="dobError"></div>
            </div>

            <button type="submit">Register</button>
            <div class="success" id="successMessage">✓ Registration successful!</div>
        </form>
    </div>

    <script>
        function handleSubmit(event) {
            event.preventDefault();
            
            // Reset errors
            document.querySelectorAll('.error').forEach(err => err.style.display = 'none');
            
            // Get form values
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const selectedClass = document.getElementById('class').value;
            const phone = document.getElementById('phone').value.trim();
            const dob = document.getElementById('dob').value;
            
            let isValid = true;

            // Name validation
            if (!name || name.length < 3) {
                showError('nameError', 'Name must be at least 3 characters');
                isValid = false;
            }

            // Email validation
            if (!email || !email.includes('@')) {
                showError('emailError', 'Please enter a valid email');
                isValid = false;
            }

            // Class validation
            if (!selectedClass) {
                showError('classError', 'Please select a class');
                isValid = false;
            }

            // Phone validation
            if (!phone || !/^\d{10}$/.test(phone)) {
                showError('phoneError', 'Phone number must be 10 digits');
                isValid = false;
            }

            // DOB validation
            if (!dob) {
                showError('dobError', 'Please select date of birth');
                isValid = false;
            }

            // If valid, show success message
            if (isValid) {
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('registrationForm').reset();
                setTimeout(() => {
                    document.getElementById('successMessage').style.display = 'none';
                }, 3000);
            }
        }

        function showError(elementId, message) {
            const errorElement = document.getElementById(elementId);
            errorElement.textContent = message;
            errorElement.style.display = 'block';
        }
    </script>
</body>
</html>
